services:

  app:
    build: .

    container_name: expense-tracker-app

    restart: on-failure

    ports:
      - "8080:8080"

    depends_on:
      - mysql-db

    env_file:
      - .env

  mysql-db:
    image: mysql:8

    container_name: mysql-db

    ports:
      - "3307:3306"

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: expense_tracker_app

    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: